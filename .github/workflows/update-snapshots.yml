name: Update Playwright Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: true
        default: 'main'

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Start Supabase
        run: npx supabase start
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Update snapshots
        run: npx playwright test auth-regression --update-snapshots
      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "test: update playwright snapshots"
          title: "Update Playwright visual snapshots (${{ inputs.branch }})"
          branch: playwright/update-snapshots-${{ inputs.branch }}
          base: ${{ inputs.branch }}
